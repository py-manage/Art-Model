{% load static %}
<!DOCTYPE html>

        <!--<< Font Awesome.css >>-->
        <link rel="stylesheet" href="{% static 'assets/css/font-awesome.css' %}">
        <!--<< Animate.css >>-->
        <link rel="stylesheet" href="{% static 'assets/css/animate.css' %}">

                <div class="page-heading">
                    <h1 class="wow fadeInUp" data-wow-delay=".3s">Error 404</h1>

                        <li>
                            <a href="">

                            </a>
                        </li>
                        <li>
                            <i class="fas fa-chevron-right"></i>
                        </li>
                        <li>
                            Error 404
                        </li>
                    </ul>
                </div>
            </div>
            </div>

                    <div class="row justify-content-center">
                        <div class="col-lg-6">
                            <div class="error-items text-center">
                                <div class="error-image wow fadeInUp" data-wow-delay=".3s">
                                    <img src="{% static 'assets/img/error.png' %}" alt="img">
                                </div>
                                <a href="" class="theme-btn wow fadeInUp" data-wow-delay=".5s">

                                </a>
                            </div>

                    </div>
                </div>
            </div>
    
            <!-- Footer Section Start -->
     {% include "partais/footer.html" %}

        <!--<< Bootstrap Js >>-->
        <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>

        <!--<< Swiper Slider Js >>-->
        <script src="{% static 'assets/js/swiper-bundle.min.js' %}"></script>

        <script src="{% static 'assets/js/splitting-animation.js' %}"></script>

        <script src="{% static 'assets/js/gsap/gsap.min.js' %}"></script>
